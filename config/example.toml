# Maelstrom Configuration
#
# Copy this file to config/local.toml and edit for your environment.
# Alternatively, set MAELSTROM_CONFIG=/path/to/config.toml

[server]
# Address to bind the HTTP listener to
bind_address = "0.0.0.0:8108"

# Public-facing server name (used in Matrix user IDs: @user:server_name)
server_name = "localhost"

# Public base URL (used in .well-known and federation discovery)
public_base_url = "http://localhost:8108"

# Username to grant admin on startup. Created if it doesn't exist.
# Also: the first user to register is automatically made admin.
# admin_user = "admin"

[database]
# SurrealDB connection endpoint
# For local development: "ws://localhost:8000" or "mem://" (in-memory)
# For file-based:        "rocksdb://data/maelstrom.db"
# For TiKV cluster:      "ws://surrealdb:8000" (SurrealDB connects to TiKV)
endpoint = "ws://localhost:8100"

# Namespace and database name
namespace = "maelstrom"
database = "maelstrom"

# Authentication credentials
username = "root"
password = "root"

[media]
# S3-compatible endpoint (RustFS)
endpoint = "http://localhost:9100"

# Bucket for all media storage
bucket = "maelstrom-media"

# S3 credentials
access_key = "maelstrom"
secret_key = "change-me-in-production"

# AWS SDK region (required, use us-east-1 for S3-compatible stores)
region = "us-east-1"

# Media retention: automatically purge media older than this many days.
# Set to 0 to disable (default). Example: 90 = delete media after 90 days.
max_age_days = 0

# How often the retention sweep runs, in seconds (default: 3600 = 1 hour)
sweep_interval_secs = 3600

# [cluster]
# Uncomment to enable multi-node clustering via chitchat gossip protocol.
# Each node gossips typing/presence state over UDP — no external broker needed.
# Omit this section entirely for single-node deployments.
#
# listen_addr = "0.0.0.0:7280"        # UDP address for gossip
# seed_nodes = ["node2:7280"]          # Peers to bootstrap from
# cluster_id = "maelstrom"             # Nodes with different IDs ignore each other
